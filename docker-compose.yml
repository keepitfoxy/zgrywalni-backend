version: "3.8"

services:
  db:
    image: postgres:15
    container_name: zgrywalni_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword123
      POSTGRES_DB: zgrywalni_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
